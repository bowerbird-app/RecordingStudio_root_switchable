name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: recording_studio_root_switchable_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d recording_studio_root_switchable_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['3.3']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Ruby ${{ matrix.ruby-version }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true
      env:
        BUNDLE_GITHUB__COM: x-access-token:${{ secrets.BOWERBIRD_ORG_CI_TOKEN }}
    
    - name: Install dummy app dependencies
      run: bundle install
      working-directory: test/dummy
      env:
        BUNDLE_GITHUB__COM: x-access-token:${{ secrets.BOWERBIRD_ORG_CI_TOKEN }}
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/recording_studio_root_switchable_test
        DB_NAME: recording_studio_root_switchable_test
    
    - name: Run database migrations
      run: bundle exec rake db:migrate RAILS_ENV=test
      working-directory: test/dummy
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/recording_studio_root_switchable_test
        DB_NAME: recording_studio_root_switchable_test

    - name: Build dummy app Tailwind assets
      run: bundle exec rails tailwindcss:build RAILS_ENV=test
      working-directory: test/dummy
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/recording_studio_root_switchable_test
        DB_NAME: recording_studio_root_switchable_test

    - name: Verify dummy app boots
      run: bundle exec ruby -e 'ENV["RAILS_ENV"] = "test"; require_relative "config/environment"; puts Rails.application.class.name'
      working-directory: test/dummy
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/recording_studio_root_switchable_test
        DB_NAME: recording_studio_root_switchable_test

    - name: Verify dummy app root-switch demo
      run: |
        bundle exec rails db:seed
        bundle exec rails runner <<'RUBY'
          require "action_dispatch/testing/integration"
          require "devise/test/integration_helpers"

          class DummyRootSwitchDemo < ActionDispatch::IntegrationTest
            include Devise::Test::IntegrationHelpers
          end

          test = DummyRootSwitchDemo.new(:root_switch_demo)
          test.host!("localhost")
          test.sign_in(User.find_by!(email: "admin@admin.com"))
          test.get(
            "/recording_studio_root_switchable/v1/root_switch",
            params: { scope: "all_workspaces" },
            headers: {
              "HTTP_USER_AGENT" => "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36"
            }
          )

          raise "Expected root switch page to render" unless test.response.successful?
          body = test.response.body
          raise "Missing scope label" unless body.include?("All workspaces")
          raise "Missing seeded root label" unless body.include?("Studio Workspace")
        RUBY
      working-directory: test/dummy
      env:
        RAILS_ENV: test
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/recording_studio_root_switchable_test
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: recording_studio_root_switchable_test

    - name: Run RuboCop
      run: bundle exec rubocop

    - name: Run tests
      run: bundle exec rake app:test
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/recording_studio_root_switchable_test
        DB_NAME: recording_studio_root_switchable_test
